name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0). If empty, uses the pushed tag."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
    steps:
      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$tag" ]; then
            echo "Tag is empty." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: esp32dev
            chip: ESP32
          - env: esp32-s3-devkitc-1
            chip: ESP32-S3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio "click<8.2"

      - name: Build firmware
        env:
          PROJECT_VER: ${{ needs.prepare.outputs.tag }}
        run: pio run -e "${{ matrix.env }}"

      - name: Build filesystem image
        env:
          PROJECT_VER: ${{ needs.prepare.outputs.tag }}
        run: pio run -e "${{ matrix.env }}" -t buildfs

      - name: Export board bundle
        run: |
          python tools/release/export_bundle.py \
            --env "${{ matrix.env }}" \
            --chip "${{ matrix.chip }}" \
            --out "release/${{ matrix.env }}"

      - name: Upload board artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.env }}
          path: release/${{ matrix.env }}
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Generate release manifests
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          python tools/release/generate_manifests.py \
            --assets-root release_assets \
            --tag "$TAG" \
            --repo "$REPO"

      - name: Flatten release files
        shell: bash
        run: |
          mkdir -p out
          find release_assets -type f -exec cp {} out/ \;
          ls -la out

      - name: Build release notes from CHANGELOG
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          version="${TAG#v}"
          awk -v ver="$version" '
            BEGIN { in_section=0; found=0 }
            /^## \[/ {
              if (in_section==1) exit
              if ($0 ~ "^## \\[" ver "\\]") {
                in_section=1
                found=1
                next
              }
            }
            in_section==1 { print }
            END {
              if (found==0) {
                exit 2
              }
            }
          ' CHANGELOG.md > release_notes.md
          rc=$?
          if [ $rc -eq 2 ]; then
            echo "Missing section in CHANGELOG.md: ## [${version}] (for tag ${TAG})" >&2
            echo "Available sections:" >&2
            grep -E "^## \\[" CHANGELOG.md >&2 || true
            exit 2
          fi
          if [ ! -s release_notes.md ]; then
            echo "No changelog content found for ${TAG}" >&2
            exit 3
          fi

      - name: Prepare GitHub Pages payload
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          rm -rf site
          mkdir -p "site/latest" "site/releases/${TAG}"
          cp out/* "site/latest/"
          cp out/* "site/releases/${TAG}/"
          cp docs/install.html "site/install.html"
          ls -la site

      - name: Publish installer + bundles to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.name }}
          prerelease: false
          body_path: release_notes.md
          files: out/*
